apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-app
  namespace: petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: shivpetclinicacr2026.azurecr.io/spring-petclinic:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080